<svg xmlns="http://www.w3.org/2000/svg" width="980" height="580" viewBox="0 0 980 580" font-family="ui-sans-serif, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#334155" stroke-width="1.3"/></marker>
    <style>
      .title{font-size:19px;font-weight:700;fill:#0f172a}
      .h{font-size:13.5px;font-weight:700;fill:#0f172a}
      .lbl{font-size:12.5px;fill:#0f172a}.sub{font-size:11.5px;fill:#475569}
      .board{fill:#2f6b4f;stroke:#1e4735;stroke-width:2}
      .conn{fill:#1f2937;stroke:#000;stroke-width:1}
      .pad{fill:#e9c46a;stroke:#b8860b;stroke-width:1.2}
      .pinlbl{font-size:11px;font-weight:700;fill:#0f172a}
      .w14{stroke:#c0392b;stroke-width:2.6;fill:none}
      .wo{stroke:#1d6fb8;stroke-width:2.6;fill:none}
      .wg{stroke:#64748b;stroke-width:2.2;fill:none}
      .w5{stroke:#1a8f4c;stroke-width:2.4;fill:none}
      .node{fill:#334155}
    </style>
  </defs>
  <rect width="980" height="580" fill="#f8fafc"/>
  <text x="24" y="32" class="title">Flow-tap interposer — in-line between the GICAR meter and the Vivaldi</text>
  <text x="24" y="54" class="sub">Passes all 3 meter pins through to the machine (untouched); taps o + − into a Schmitt buffer; ito gets OUT / 5V / GND only.</text>

  <!-- board -->
  <rect x="330" y="150" width="300" height="250" rx="12" class="board"/>
  <text x="480" y="176" fill="#dbece2" font-size="12.5" text-anchor="middle" font-weight="700">flow-tap (JLC/PCBWay SMT)</text>

  <!-- buffer -->
  <path d="M440,250 L440,320 L512,285 Z" fill="#eef2f7" stroke="#334155" stroke-width="1.8"/>
  <path d="M458,278 h14 v8 M458,292 h14 v-8" fill="none" stroke="#334155" stroke-width="1.3"/>
  <text x="470" y="340" class="sub" fill="#dbece2" text-anchor="middle">74LVC1G17</text>
  <!-- decoupling cap -->
  <rect x="530" y="240" width="30" height="15" rx="2" fill="#8a6d3b" stroke="#5b4626"/>
  <text x="545" y="234" class="sub" fill="#dbece2" text-anchor="middle">0.1µF</text>

  <!-- ================= J1 · GICAR meter (left) ================= -->
  <rect x="150" y="185" width="60" height="110" rx="4" class="conn"/>
  <text x="180" y="178" class="h" text-anchor="middle">J1 · GICAR meter</text>
  <rect x="210" y="200" width="14" height="14" class="pad"/><text x="240" y="211" class="pinlbl">+  (14.3 V)</text>
  <rect x="210" y="233" width="14" height="14" class="pad"/><text x="240" y="244" class="pinlbl">−  (GND)</text>
  <rect x="210" y="266" width="14" height="14" class="pad"/><text x="240" y="277" class="pinlbl">o  (pulse)</text>

  <!-- ================= J2 · to Vivaldi (right top) ================= -->
  <rect x="770" y="150" width="60" height="110" rx="4" class="conn"/>
  <text x="800" y="143" class="h" text-anchor="middle">J2 · to Vivaldi</text>
  <rect x="756" y="165" width="14" height="14" class="pad"/><text x="750" y="176" class="pinlbl" text-anchor="end">+</text>
  <rect x="756" y="198" width="14" height="14" class="pad"/><text x="750" y="209" class="pinlbl" text-anchor="end">−</text>
  <rect x="756" y="231" width="14" height="14" class="pad"/><text x="750" y="242" class="pinlbl" text-anchor="end">o</text>
  <text x="800" y="278" class="sub" text-anchor="middle">straight pass-</text>
  <text x="800" y="292" class="sub" text-anchor="middle">through</text>

  <!-- ================= J3 · to ito (right bottom) ================= -->
  <rect x="770" y="310" width="60" height="110" rx="4" class="conn"/>
  <text x="800" y="303" class="h" text-anchor="middle">J3 · to ito</text>
  <rect x="756" y="325" width="14" height="14" class="pad"/><text x="750" y="336" class="pinlbl" text-anchor="end">OUT</text>
  <rect x="756" y="358" width="14" height="14" class="pad"/><text x="750" y="369" class="pinlbl" text-anchor="end">5V</text>
  <rect x="756" y="391" width="14" height="14" class="pad"/><text x="750" y="402" class="pinlbl" text-anchor="end">GND</text>
  <text x="800" y="430" class="sub" text-anchor="middle">no + pin →</text>
  <text x="800" y="444" class="sub" text-anchor="middle" fill="#a5281b">14.3 V can't reach ito</text>

  <!-- ================= NETS ================= -->
  <!-- + : J1 straight to J2, nowhere else -->
  <path d="M224,207 L300,207 L300,172 L756,172" class="w14"/>
  <text x="360" y="200" class="sub" fill="#a5281b">+14.3 V pass-through ONLY</text>

  <!-- − : J1 -> J2, buffer GND, J3 GND -->
  <path d="M224,240 L290,240" class="wg"/>
  <circle cx="290" cy="240" r="4" class="node"/>
  <path d="M290,240 L290,205 L756,205" class="wg"/>            <!-- to J2 − -->
  <path d="M290,240 L290,398 L756,398" class="wg"/>            <!-- to J3 GND -->
  <path d="M476,320 L476,360 L290,360" class="wg"/>            <!-- buffer GND to − net -->
  <text x="300" y="256" class="sub">− shared</text>

  <!-- o : J1 -> J2 + buffer IN -->
  <path d="M224,273 L410,273" class="wo"/>
  <circle cx="410" cy="273" r="4" class="node"/>
  <path d="M410,273 L410,238 L756,238" class="wo"/>            <!-- to J2 o -->
  <path d="M410,285 L440,285" class="wo" marker-end="url(#a)"/> <!-- to buffer IN -->
  <text x="300" y="289" class="sub">o tapped</text>

  <!-- buffer OUT -> J3 OUT -->
  <path d="M512,285 L620,285 L620,332 L756,332" class="wo" marker-end="url(#a)"/>
  <text x="540" y="278" class="sub" fill="#1d6fb8">clean 0↔5 V</text>

  <!-- 5V from J3 -> buffer VCC + cap -->
  <path d="M756,365 L650,365 L650,247 L560,247" class="w5"/>
  <path d="M545,247 L545,268 L476,268 L476,250" class="w5" marker-end="url(#a)"/>
  <text x="600" y="360" class="sub" fill="#1a8f4c">ito 5 V → VCC</text>

  <!-- ================= flow-of-use note ================= -->
  <rect x="24" y="470" width="930" height="92" rx="8" fill="#eef2f7" stroke="#cbd5e1"/>
  <text x="40" y="493" class="lbl" font-weight="700">Install = 3 plugs, fully reversible (no cutting):</text>
  <text x="40" y="514" class="sub">1. Unplug the GICAR flow meter from the Vivaldi.   2. Meter → J1.   3. J2 → the Vivaldi's now-empty flow socket.   4. ito flow cable → J3.</text>
  <text x="40" y="533" class="sub">To revert: pull the board, plug the meter back into the Vivaldi. The machine never knows it was there — J1↔J2 is a straight pass-through.</text>
  <text x="40" y="552" class="sub" fill="#a5281b">Safety by construction: the +14.3 V rail only bridges J1→J2; there is no + pin on J3, so it physically cannot reach ito.</text>
</svg>
