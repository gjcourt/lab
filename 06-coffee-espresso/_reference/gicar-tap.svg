<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" font-family="ui-sans-serif, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#334155" stroke-width="1.4"/></marker>
    <style>
      .t{fill:#0f172a}.title{font-size:19px;font-weight:700;fill:#0f172a}
      .panel{font-size:15px;font-weight:700}
      .box{fill:#eef2f7;stroke:#334155;stroke-width:1.8;rx:6}
      .chip{fill:#e6ddf5;stroke:#5b3a8c;stroke-width:1.8}
      .lbl{font-size:12.5px;fill:#0f172a}.sub{font-size:11.5px;fill:#475569}
      .pin{font-size:12px;font-weight:700;fill:#0f172a}
      .w14{stroke:#c0392b;stroke-width:2.6;fill:none}
      .wo{stroke:#1d6fb8;stroke-width:2.6;fill:none}
      .wg{stroke:#64748b;stroke-width:2.2;fill:none}
      .w5{stroke:#1a8f4c;stroke-width:2.4;fill:none}
      .node{fill:#1d6fb8}.gnode{fill:#64748b}
      .badge{fill:#fdecea;stroke:#c0392b;stroke-width:1.3}
      .warn{font-size:11.5px;fill:#a5281b;font-weight:600}
      .keyrow{font-size:12px}
    </style>
  </defs>
  <rect width="1180" height="700" fill="#f8fafc"/>
  <text x="24" y="34" class="title">Tapping the stock GICAR flow meter — two topologies (share the machine's meter, nothing inline)</text>
  <line x1="590" y1="56" x2="590" y2="618" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- ===================== PANEL A : blondica ===================== -->
  <text x="24" y="80" class="panel" fill="#5b3a8c">A · blondica — buffered CD4011B  ·  bench-proven ✓</text>

  <!-- GICAR meter -->
  <rect x="40" y="150" width="96" height="150" rx="6" class="box"/>
  <text x="88" y="140" class="lbl" text-anchor="middle" font-weight="700">GICAR meter</text>
  <text x="88" y="230" class="sub" text-anchor="middle">open-</text>
  <text x="88" y="245" class="sub" text-anchor="middle">collector</text>
  <circle cx="136" cy="178" r="4" fill="#c0392b"/><text x="120" y="182" class="pin" text-anchor="end">+</text>
  <circle cx="136" cy="225" r="4" class="gnode"/><text x="120" y="229" class="pin" text-anchor="end">−</text>
  <circle cx="136" cy="272" r="4" class="node"/><text x="120" y="276" class="pin" text-anchor="end">o</text>

  <!-- Vivaldi board -->
  <rect x="410" y="118" width="150" height="66" rx="6" class="box"/>
  <text x="485" y="147" class="lbl" text-anchor="middle" font-weight="700">Vivaldi board</text>
  <text x="485" y="166" class="sub" text-anchor="middle">(pulls o up to 5 V)</text>

  <!-- CD4011B chip -->
  <rect x="250" y="360" width="150" height="120" rx="6" class="chip"/>
  <text x="325" y="352" class="lbl" text-anchor="middle" font-weight="700" fill="#5b3a8c">CD4011B (1 gate)</text>
  <text x="262" y="388" class="pin">14 VDD</text>
  <text x="262" y="410" class="pin">1  A</text>
  <text x="262" y="432" class="pin">2  B</text>
  <text x="262" y="470" class="pin">7  VSS</text>
  <text x="388" y="432" class="pin" text-anchor="end">3 OUT</text>

  <!-- ito -->
  <rect x="430" y="500" width="150" height="86" rx="6" class="box"/>
  <text x="505" y="528" class="lbl" text-anchor="middle" font-weight="700">ito (leva!)</text>
  <text x="505" y="547" class="sub" text-anchor="middle">5 V logic</text>
  <circle cx="430" cy="560" r="4" class="node"/><text x="424" y="564" class="sub" text-anchor="end">IMPULSE</text>

  <!-- +14.3 to Vivaldi ONLY -->
  <path d="M136,178 L360,178 L360,150 L410,150" class="w14" marker-end="url(#ar)"/>
  <text x="250" y="171" class="warn">+14.3 V → Vivaldi ONLY (never to ito)</text>

  <!-- GND shared -->
  <path d="M136,225 L200,225" class="wg"/>
  <circle cx="200" cy="225" r="4" class="gnode"/>
  <path d="M200,225 L200,470 L250,470" class="wg" marker-end="url(#ar)"/>
  <path d="M200,225 L390,225 L390,140 L410,140" class="wg"/>
  <path d="M200,300 L200,560 L430,560" class="wg" opacity="0"/>
  <text x="150" y="219" class="sub">GND (shared)</text>

  <!-- o : Y-tap -->
  <path d="M136,272 L230,272" class="wo"/>
  <circle cx="230" cy="272" r="4.5" class="node"/>
  <path d="M230,272 L230,150 L410,132" class="wo" marker-end="url(#ar)"/>
  <text x="235" y="120" class="sub">o → machine keeps its own pulses</text>
  <path d="M230,272 L230,432 L250,432" class="wo" marker-end="url(#ar)"/>

  <!-- ito 5V feeds VDD + A -->
  <path d="M505,500 L505,340 L235,340 L235,388 L250,388" class="w5" marker-end="url(#ar)"/>
  <path d="M235,340 L235,410 L250,410" class="w5" marker-end="url(#ar)"/>
  <text x="300" y="333" class="sub" fill="#1a8f4c">ito 5 V → VDD + A (tied high)</text>

  <!-- VSS to GND -->
  <path d="M250,470 L215,470" class="wg"/>

  <!-- OUT to ito IMPULSE -->
  <path d="M400,432 L415,432 L415,560 L430,560" class="wo" marker-end="url(#ar)"/>
  <text x="392" y="500" class="sub" fill="#1d6fb8">0↔5 V pulse (inverted, fine)</text>

  <!-- ===================== PANEL B : sandc ===================== -->
  <text x="612" y="80" class="panel" fill="#a5281b">B · sandc — direct tap, no IC  ·  untested ⚠</text>

  <!-- GICAR meter -->
  <rect x="628" y="150" width="96" height="150" rx="6" class="box"/>
  <text x="676" y="140" class="lbl" text-anchor="middle" font-weight="700">GICAR meter</text>
  <text x="676" y="230" class="sub" text-anchor="middle">open-</text>
  <text x="676" y="245" class="sub" text-anchor="middle">collector</text>
  <circle cx="724" cy="178" r="4" fill="#c0392b"/><text x="708" y="182" class="pin" text-anchor="end">+</text>
  <circle cx="724" cy="225" r="4" class="gnode"/><text x="708" y="229" class="pin" text-anchor="end">−</text>
  <circle cx="724" cy="272" r="4" class="node"/><text x="708" y="276" class="pin" text-anchor="end">o</text>

  <!-- Vivaldi -->
  <rect x="1000" y="118" width="150" height="66" rx="6" class="box"/>
  <text x="1075" y="147" class="lbl" text-anchor="middle" font-weight="700">Vivaldi board</text>
  <text x="1075" y="166" class="sub" text-anchor="middle">(pulls o up to 5 V)</text>

  <!-- ito -->
  <rect x="1000" y="420" width="150" height="96" rx="6" class="box"/>
  <text x="1075" y="450" class="lbl" text-anchor="middle" font-weight="700">ito (leva!)</text>
  <circle cx="1000" cy="470" r="4" class="node"/><text x="994" y="474" class="sub" text-anchor="end">IMPULSE</text>
  <text x="1075" y="492" class="warn" text-anchor="middle">remove R6 (10 kΩ)</text>
  <text x="1075" y="507" class="warn" text-anchor="middle">+ C8 (100 nF)</text>

  <!-- +14.3 to Vivaldi ONLY -->
  <path d="M724,178 L950,178 L950,150 L1000,150" class="w14" marker-end="url(#ar)"/>
  <text x="838" y="171" class="warn">+14.3 V → Vivaldi ONLY</text>

  <!-- GND shared -->
  <path d="M724,225 L788,225" class="wg"/>
  <circle cx="788" cy="225" r="4" class="gnode"/>
  <path d="M788,225 L980,225 L980,140 L1000,140" class="wg"/>
  <path d="M788,225 L788,500 L1000,500" class="wg" marker-end="url(#ar)"/>
  <text x="738" y="219" class="sub">GND (shared)</text>

  <!-- o : Y-tap direct to both -->
  <path d="M724,272 L818,272" class="wo"/>
  <circle cx="818" cy="272" r="4.5" class="node"/>
  <path d="M818,272 L818,132 L1000,132" class="wo" marker-end="url(#ar)"/>
  <text x="823" y="120" class="sub">o → machine keeps its own pulses</text>
  <path d="M818,272 L818,470 L1000,470" class="wo" marker-end="url(#ar)"/>
  <text x="835" y="300" class="lbl" fill="#1d6fb8" font-weight="700">o → ito directly (no buffer)</text>

  <!-- ===================== what-changes callout ===================== -->
  <rect x="628" y="556" width="522" height="120" rx="8" class="badge"/>
  <text x="644" y="580" class="lbl" font-weight="700" fill="#a5281b">Going sandc → what changes vs blondica</text>
  <text x="644" y="601" class="keyrow">• Delete the CD4011B gate (and the optional PC817 opto) — no buffer IC, nothing to power.</text>
  <text x="644" y="620" class="keyrow">• Wire GICAR o straight to ito IMPULSE, but first REMOVE ito's R6 (10 kΩ pull-up) + C8 (100 nF filter).</text>
  <text x="644" y="639" class="keyrow">• Both controller inputs now sit directly on one line → ito can disturb the meter the MACHINE relies on.</text>
  <text x="644" y="658" class="keyrow">• Fewer parts, no isolation, unproven. blondica's buffer keeps ito from ever loading the Vivaldi's line.</text>

  <!-- legend -->
  <rect x="24" y="620" width="540" height="56" rx="8" fill="#eef2f7" stroke="#cbd5e1"/>
  <text x="40" y="641" class="keyrow" font-weight="700">Key</text>
  <line x1="40" y1="658" x2="70" y2="658" class="w14"/><text x="76" y="662" class="keyrow">+14.3 V (Vivaldi only)</text>
  <line x1="230" y1="658" x2="260" y2="658" class="wo"/><text x="266" y="662" class="keyrow">o pulse (5 V O-C)</text>
  <line x1="400" y1="658" x2="430" y2="658" class="wg"/><text x="436" y="662" class="keyrow">GND</text>
  <line x1="40" y1="672" x2="70" y2="672" class="w5" opacity="1"/><text x="76" y="676" class="keyrow" fill="#1a8f4c">ito 5 V</text>
</svg>
