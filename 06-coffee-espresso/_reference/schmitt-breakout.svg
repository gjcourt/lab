<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" font-family="ui-sans-serif, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#334155" stroke-width="1.3"/></marker>
    <style>
      .title{font-size:19px;font-weight:700;fill:#0f172a}
      .h{font-size:14px;font-weight:700;fill:#0f172a}
      .lbl{font-size:12.5px;fill:#0f172a}.sub{font-size:11.5px;fill:#475569}
      .pad{fill:#e9c46a;stroke:#b8860b;stroke-width:1.4}
      .padlbl{font-size:12px;font-weight:700;fill:#0f172a}
      .trace{stroke:#1a8f4c;stroke-width:2;fill:none}
      .chip{fill:#22262b;stroke:#000;stroke-width:1}
      .leg{stroke:#9aa3ad;stroke-width:3}
      .cap{fill:#8a6d3b;stroke:#5b4626;stroke-width:1}
      .net{stroke:#334155;stroke-width:1.8;fill:none}
      .pinf{font-size:10.5px;fill:#cbd5e1;font-weight:700}
    </style>
  </defs>
  <rect width="960" height="560" fill="#f8fafc"/>
  <text x="24" y="34" class="title">74LVC1G17 Schmitt-trigger buffer — a minimal breakout</text>
  <text x="24" y="56" class="sub">Whole board is ~15 × 12 mm: one SOT-23-5 chip, one 0.1 µF cap, a 4-pin header. Four wires and you're done.</text>

  <!-- ================= PHYSICAL TOP VIEW ================= -->
  <text x="70" y="96" class="h">Board · top view</text>
  <rect x="70" y="110" width="330" height="250" rx="10" fill="#2f6b4f" stroke="#1e4735" stroke-width="2"/>
  <rect x="70" y="110" width="330" height="250" rx="10" fill="#2f6b4f" opacity="0.0"/>

  <!-- chip SOT-23-5 -->
  <rect x="205" y="185" width="72" height="52" rx="3" class="chip"/>
  <text x="241" y="207" fill="#e8edf2" font-size="11" text-anchor="middle" font-weight="700">74LVC</text>
  <text x="241" y="221" fill="#e8edf2" font-size="11" text-anchor="middle" font-weight="700">1G17</text>
  <!-- legs: 3 bottom, 2 top -->
  <line x1="220" y1="237" x2="220" y2="252" class="leg"/><text x="220" y="266" class="lbl" text-anchor="middle" font-size="10">A(in)</text>
  <line x1="241" y1="237" x2="241" y2="252" class="leg"/><text x="241" y="266" class="lbl" text-anchor="middle" font-size="10">GND</text>
  <line x1="262" y1="237" x2="262" y2="252" class="leg"/><text x="262" y="266" class="lbl" text-anchor="middle" font-size="10">Y(out)</text>
  <line x1="230" y1="185" x2="230" y2="170" class="leg"/><text x="230" y="164" class="lbl" text-anchor="middle" font-size="10">VCC</text>
  <line x1="252" y1="185" x2="252" y2="170" class="leg"/><text x="256" y="164" class="lbl" text-anchor="start" font-size="10">NC</text>

  <!-- decoupling cap between VCC and GND -->
  <rect x="300" y="182" width="34" height="18" rx="2" class="cap"/>
  <text x="317" y="176" class="sub" text-anchor="middle">0.1 µF</text>

  <!-- 4-pin header along bottom -->
  <g>
    <rect x="110" y="322" width="26" height="26" rx="4" class="pad"/><text x="123" y="366" class="padlbl" text-anchor="middle">5V</text>
    <rect x="178" y="322" width="26" height="26" rx="4" class="pad"/><text x="191" y="366" class="padlbl" text-anchor="middle">IN</text>
    <rect x="246" y="322" width="26" height="26" rx="4" class="pad"/><text x="259" y="366" class="padlbl" text-anchor="middle">OUT</text>
    <rect x="314" y="322" width="26" height="26" rx="4" class="pad"/><text x="327" y="366" class="padlbl" text-anchor="middle">GND</text>
  </g>

  <!-- traces -->
  <path d="M123,322 L123,178 L230,178 L230,170" class="trace"/>            <!-- 5V -> VCC -->
  <path d="M300,191 L230,191" class="trace"/>                               <!-- cap to VCC side -->
  <path d="M334,191 L350,191 L350,300 L241,300 L241,252" class="trace"/>    <!-- cap+GND rail -> GND leg -->
  <path d="M327,322 L327,300" class="trace"/>                               <!-- GND pad -> GND rail -->
  <path d="M191,322 L191,290 L220,290 L220,252" class="trace"/>             <!-- IN -> A -->
  <path d="M259,322 L259,280 L262,280 L262,252" class="trace"/>             <!-- OUT -> Y -->

  <text x="70" y="392" class="sub">Legs labelled by FUNCTION — check your part's datasheet for the SOT-23-5 pin numbers (they vary by vendor).</text>

  <!-- ================= SCHEMATIC ================= -->
  <text x="500" y="96" class="h">Schematic · what those 4 wires do</text>

  <!-- rails -->
  <line x1="540" y1="140" x2="900" y2="140" class="net"/>
  <text x="540" y="132" class="lbl" font-weight="700">5 V (from ito)</text>
  <line x1="540" y1="330" x2="900" y2="330" class="net"/>
  <text x="540" y="352" class="lbl" font-weight="700">GND (shared)</text>

  <!-- buffer triangle with schmitt symbol -->
  <path d="M660,200 L660,270 L730,235 Z" fill="#eef2f7" stroke="#334155" stroke-width="1.8"/>
  <!-- schmitt hysteresis glyph -->
  <path d="M678,228 h14 v8 M678,242 h14 v-8" fill="none" stroke="#334155" stroke-width="1.4"/>
  <text x="695" y="292" class="sub" text-anchor="middle">Schmitt buffer</text>

  <!-- VCC to apex top -->
  <line x1="695" y1="140" x2="695" y2="200" class="net"/>
  <circle cx="695" cy="140" r="3" fill="#334155"/>
  <!-- GND from bottom -->
  <line x1="695" y1="270" x2="695" y2="330" class="net"/>
  <circle cx="695" cy="330" r="3" fill="#334155"/>

  <!-- decoupling cap on rails -->
  <line x1="600" y1="140" x2="600" y2="228" class="net"/>
  <line x1="590" y1="228" x2="610" y2="228" class="net"/>
  <line x1="590" y1="238" x2="610" y2="238" class="net"/>
  <line x1="600" y1="238" x2="600" y2="330" class="net"/>
  <text x="616" y="238" class="sub">0.1 µF</text>

  <!-- input -->
  <line x1="560" y1="235" x2="660" y2="235" class="net" marker-end="url(#a)"/>
  <text x="556" y="228" class="lbl" text-anchor="end">IN ← GICAR o</text>
  <text x="556" y="248" class="sub" text-anchor="end">(5 V open-collector)</text>

  <!-- output -->
  <line x1="730" y1="235" x2="860" y2="235" class="net" marker-end="url(#a)"/>
  <text x="864" y="232" class="lbl">OUT → ito IMPULSE</text>
  <text x="864" y="250" class="sub">(clean 0↔5 V, non-inverting)</text>

  <!-- note box -->
  <rect x="500" y="392" width="400" height="120" rx="8" fill="#eef2f7" stroke="#cbd5e1"/>
  <text x="516" y="416" class="lbl" font-weight="700">Why bother vs. a plain buffer</text>
  <text x="516" y="437" class="sub">• Schmitt input adds hysteresis → squares up the slow, coarse</text>
  <text x="516" y="454" class="sub">  ~2 pulse/mL GICAR edges and rejects noise. Cleaner counts.</text>
  <text x="516" y="474" class="sub">• High-impedance input → never loads the Vivaldi's flow line.</text>
  <text x="516" y="491" class="sub">• If you'd rather stay through-hole: 74HC14 / CD40106 (hex</text>
  <text x="516" y="505" class="sub">  Schmitt inverter, DIP) is a drop-in for the CD4011B — inverts, fine.</text>
</svg>
