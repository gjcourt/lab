# Default state for all rules
default: true

# MD013/line-length - Line length
MD013: false

# MD025/single-title/single-h1 - Multiple top-level headings in the same document
MD025: false

# MD033/no-inline-html - Inline HTML
MD033: false

# MD041/first-line-heading/first-line-h1 - First line in a file should be a top-level heading
MD041: false

# MD029/ol-prefix - Ordered list item prefix. Off so reference docs can carry a single
# continuous numbering across interleaved subsections (e.g. a 1..N acceptance checklist).
MD029: false

# MD036/no-emphasis-as-heading - Off so prose/reference docs can use bold inline labels
# (e.g. **Gotchas**, **Network**) without promoting each to a real heading.
MD036: false
